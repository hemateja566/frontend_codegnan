<!DOCTYPE html>
<html>
<head>
    <title>Register - Food Paradise</title>
</head>

<body>

    <center>
        <h1>Register Page</h1>

        <a href="home.html">Home</a> |
        <a href="menu.html">Menu</a> |
        <a href="register.html">Register</a> |
        <a href="contact.html">Contact</a>

        
    </center>

    <form>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter your email"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" placeholder="Enter phone number"><br><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Enter password"><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>

        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other

        <br><br>

        <!-- Food Choice -->
        <label>Favorite Food:</label><br>

        <input type="checkbox"> Pizza
        <input type="checkbox"> Burger
        <input type="checkbox"> Pasta
        <input type="checkbox"> Ice Cream

        <br><br>

        <!-- Dropdown -->
        <label>Choose Your City:</label><br>

        <select>
            <option>Hyderabad</option>
            <option>Chennai</option>
            <option>Bangalore</option>
            <option>Mumbai</option>
        </select>

        <br><br>

        <!-- Chatbox / Textarea -->
        <label>Feedback / Message:</label><br>

        <textarea rows="5" cols="40"
        placeholder="Write your message here..."></textarea>

        <br><br>

        <input type="submit" value="Register">

        <input type="reset" value="Clear">

    </form>

</body>
</html>
